<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Maze Game</title>

<style>
body {
    margin: 0;
    background: #0f1423;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: Arial;
}

canvas {
    border: 2px solid #333;
    background: #0f1423;
}

.hidden { display: none; }
button { padding: 10px 20px; margin: 5px; }
</style>
</head>

<body>

<div id="menu">
    <h2>Складність</h2>
    <button onclick="start(11)">Легко</button>
    <button onclick="start(15)">Середньо</button>
    <button onclick="start(21)">Складно</button>
</div>

<canvas id="c" width="600" height="600"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

let size, cell;
let map = [];
let p = {x:1,y:1};

function start(s){
    size = s;
    cell = c.width / size;

    document.getElementById("menu").classList.add("hidden");

    build();
    draw();
}

function build(){
    map = Array.from({length:size}, ()=>Array(size).fill(true));

    carve(1,1);

    map[1][1] = false;
    map[size-2][size-2] = false;
}

// простий DFS (СТАБІЛЬНИЙ)
function carve(x,y){
    map[y][x] = false;

    let dirs = shuffle([
        [0,-2],[2,0],[0,2],[-2,0]
    ]);

    for(let d of dirs){
        let nx = x + d[0];
        let ny = y + d[1];

        if(nx>0 && ny>0 && nx<size-1 && ny<size-1 && map[ny][nx]){
            map[y + d[1]/2][x + d[0]/2] = false;
            carve(nx,ny);
        }
    }
}

function draw(){
    ctx.clearRect(0,0,600,600);

    for(let y=0;y<size;y++){
        for(let x=0;x<size;x++){
            if(map[y][x]){
                ctx.fillStyle="#2c3140";
                ctx.fillRect(x*cell,y*cell,cell,cell);
            }
        }
    }

    ctx.fillStyle="red";
    ctx.fillRect((size-2)*cell,(size-2)*cell,cell,cell);

    ctx.fillStyle="lime";
    ctx.beginPath();
    ctx.arc(p.x*cell+cell/2,p.y*cell+cell/2,cell/3,0,Math.PI*2);
    ctx.fill();
}

window.addEventListener("keydown",(e)=>{
    let nx=p.x, ny=p.y;

    if(e.key==="ArrowUp") ny--;
    if(e.key==="ArrowDown") ny++;
    if(e.key==="ArrowLeft") nx--;
    if(e.key==="ArrowRight") nx++;

    if(!map[ny][nx]){
        p.x=nx;
        p.y=ny;
    }

    draw();

    if(p.x===size-2 && p.y===size-2){
        alert("Перемога!");
    }
});

function shuffle(a){
    return a.sort(()=>Math.random()-0.5);
}
</script>

</body>
</html>
