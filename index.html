<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гра Лабіринт</title>
    <style>
        body {
            background-color: #0f1423;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #menu, #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #32ff96;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(50, 255, 150, 0.3);
        }
        button {
            background-color: #1e325a;
            color: white;
            border: 2px solid #1e325a;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            margin: 10px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }
        button:hover {
            background-color: #32ff96;
            color: #0f1423;
            border-color: #32ff96;
            box-shadow: 0 0 15px rgba(50, 255, 150, 0.5);
        }
        canvas {
            border: 2px solid #282d37;
            background-color: #0f1423;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #stats {
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            letter-spacing: 1px;
        }
        #victory-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 15, 30, 0.92);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        #victory-screen h2 {
            color: #32ff96;
            font-size: 32px;
            margin: 10px 0;
        }
        #victory-screen p {
            font-size: 20px;
            margin: 5px 0 25px 0;
        }
        .cup {
            font-size: 80px;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .hidden { display: none !important; }
    </style>
</head>

    <div id="menu">
        <h1>Оберіть рівень скла
